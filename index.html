<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Family Tree</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --gold-dim: rgba(201,168,76,0.15);
    --gold-glow: rgba(201,168,76,0.35);
    --black: #000000;
    --card: #111111;
    --text: #F0EDE8;
    --text-dim: rgba(240,237,232,0.5);
    --border: rgba(201,168,76,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--black); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow: hidden; }

  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.03) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.03) 0%, transparent 60%); pointer-events: none; z-index: 0; }

  header { position: fixed; top: 0; left: 0; right: 0; z-index: 50; padding: 20px 40px; background: linear-gradient(to bottom, rgba(0,0,0,0.98) 0%, transparent 100%); display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 20px; }
  .ornament { display: flex; align-items: center; gap: 10px; }
  .orn-line { width: 40px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold)); }
  .orn-line.r { background: linear-gradient(90deg, var(--gold), transparent); }
  .orn-diamond { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); }
  h1 { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 600; color: var(--text); letter-spacing: 2px; }
  h1 em { color: var(--gold); font-style: italic; }
  .member-count { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); border: 1px solid var(--border); padding: 5px 14px; border-radius: 2px; background: rgba(201,168,76,0.05); }
  .controls { display: flex; gap: 8px; }
  .ctrl-btn { background: rgba(201,168,76,0.08); border: 1px solid var(--border); color: var(--gold); width: 36px; height: 36px; border-radius: 4px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; font-family: 'Cormorant Garamond', serif; }
  .ctrl-btn:hover { background: var(--gold-dim); box-shadow: 0 0 12px var(--gold-glow); }

  #cy { width: 100vw; height: 100vh; background: transparent; }

  .side-panel { position: fixed; top: 0; right: -420px; width: 400px; height: 100vh; background: linear-gradient(180deg, #0D0D0D 0%, #080808 100%); border-left: 1px solid var(--border); z-index: 200; transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; overflow: hidden; }
  .side-panel.open { right: 0; }
  .panel-header { padding: 40px 32px 24px; border-bottom: 1px solid var(--border); position: relative; background: linear-gradient(180deg, rgba(201,168,76,0.05) 0%, transparent 100%); }
  .panel-close { position: absolute; top: 20px; right: 20px; width: 32px; height: 32px; background: rgba(201,168,76,0.1); border: 1px solid var(--border); border-radius: 50%; color: var(--gold); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.2s; }
  .panel-close:hover { background: var(--gold-dim); }
  .panel-ornament { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .panel-orn-line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--gold), transparent); }
  .panel-name { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; color: var(--text); margin-bottom: 6px; line-height: 1.2; }
  .panel-relation { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
  .panel-discord { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; }
  .panel-body { flex: 1; overflow-y: auto; padding: 24px 32px; }
  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .panel-section { margin-bottom: 28px; }
  .panel-section-title { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
  .panel-section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }
  .relation-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .relation-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: rgba(201,168,76,0.04); border: 1px solid rgba(201,168,76,0.1); border-radius: 6px; cursor: pointer; transition: all 0.2s; }
  .relation-item:hover { background: rgba(201,168,76,0.08); border-color: rgba(201,168,76,0.25); transform: translateX(4px); }
  .relation-dot { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; flex-shrink: 0; }
  .relation-item-content { flex: 1; }
  .relation-item-name { font-size: 13px; color: var(--text); font-family: 'Cormorant Garamond', serif; font-weight: 600; }
  .relation-item-role { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; margin-top: 1px; }
  .relation-arrow { color: var(--gold); opacity: 0.5; font-size: 12px; }
  .birthday-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; background: rgba(201,168,76,0.08); border: 1px solid var(--border); border-radius: 6px; font-size: 13px; color: var(--text); font-family: 'Cormorant Garamond', serif; }
  .added-by-text { font-size: 12px; color: var(--text-dim); font-style: italic; padding: 8px 0; }
  .panel-footer { padding: 20px 32px; border-top: 1px solid var(--border); background: linear-gradient(0deg, rgba(201,168,76,0.03) 0%, transparent 100%); }
  .footer-ornament { display: flex; align-items: center; justify-content: center; gap: 12px; opacity: 0.4; }
  .footer-orn-line { width: 60px; height: 1px; background: var(--gold); }

  .loading { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--black); z-index: 300; transition: opacity 0.6s; }
  .loading.hidden { opacity: 0; pointer-events: none; }
  .loading-ornament { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  .loading-line { width: 80px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold)); animation: loadLine 1.5s ease-in-out infinite; }
  .loading-line.r { background: linear-gradient(90deg, var(--gold), transparent); animation-delay: 0.75s; }
  @keyframes loadLine { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
  .loading h2 { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; color: var(--text); letter-spacing: 4px; margin-bottom: 8px; }
  .loading h2 em { color: var(--gold); font-style: italic; }
  .loading p { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

  footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 16px 40px; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 100%); display: flex; align-items: center; justify-content: space-between; z-index: 50; }
  .legend { display: flex; align-items: center; gap: 20px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-dim); letter-spacing: 0.5px; }
  .legend-box { width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid var(--gold); background: #111111; }
  .legend-box.you { border-width: 2.5px; box-shadow: 0 0 8px var(--gold-glow); }
  .legend-line { width: 24px; height: 2px; background: var(--gold); }
  .legend-line.dashed { background: none; border-top: 2px dashed var(--gold); }
  .hint { font-size: 11px; color: var(--text-dim); letter-spacing: 0.5px; }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 150; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
  .overlay.visible { opacity: 1; pointer-events: all; }
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="loading-ornament">
    <div class="loading-line"></div>
    <div class="orn-diamond"></div>
    <div class="loading-line r"></div>
  </div>
  <h2>The <em>Family</em> Tree</h2>
  <p>Gathering the roots...</p>
</div>

<header>
  <div class="header-left">
    <div class="ornament">
      <div class="orn-line"></div>
      <div class="orn-diamond"></div>
      <div class="orn-line r"></div>
    </div>
    <h1>The <em>Family</em> Tree</h1>
    <div class="member-count" id="member-count">Loading...</div>
  </div>
  <div class="controls">
    <button class="ctrl-btn" id="zoom-in">+</button>
    <button class="ctrl-btn" id="zoom-out">−</button>
    <button class="ctrl-btn" id="reset-view">⌂</button>
  </div>
</header>

<div id="cy"></div>
<div class="overlay" id="overlay"></div>

<div class="side-panel" id="side-panel">
  <div class="panel-header">
    <button class="panel-close" id="panel-close">✕</button>
    <div class="panel-ornament">
      <div class="orn-diamond"></div>
      <div class="panel-orn-line"></div>
    </div>
    <div class="panel-name" id="panel-name">Name</div>
    <div class="panel-relation" id="panel-relation">Relation</div>
    <div class="panel-discord" id="panel-discord"></div>
  </div>
  <div class="panel-body" id="panel-body"></div>
  <div class="panel-footer">
    <div class="footer-ornament">
      <div class="footer-orn-line"></div>
      <div class="orn-diamond"></div>
      <div class="footer-orn-line"></div>
    </div>
  </div>
</div>

<footer>
  <div class="legend">
    <div class="legend-item"><div class="legend-box you"></div><span>Jamisha (Root)</span></div>
    <div class="legend-item"><div class="legend-box"></div><span>Family Member</span></div>
    <div class="legend-item"><div class="legend-line"></div><span>Parent / Child</span></div>
    <div class="legend-item"><div class="legend-line dashed"></div><span>Partner / Co-Parent</span></div>
  </div>
  <div class="hint">Scroll to zoom · Drag to pan · Click a card for details</div>
</footer>

<script>
const SUPABASE_URL = 'https://wlifcojugqocdxfkwoae.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndsaWZjb2p1Z3FvY2R4Zmt3b2FlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MDU4NTYsImV4cCI6MjA5MTA4MTg1Nn0.TKcJPTEFFcBM4lZgKMd8H4Ejy9F7wTmPdYMkYofMMCQ';
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function formatBirthday(dateStr) {
  if (!dateStr || dateStr.startsWith('1900')) return null;
  const parts = dateStr.split('-');
  return `${MONTHS[parseInt(parts[1],10)-1]} ${parseInt(parts[2],10)}`;
}

async function fetchData() {
  const headers = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` };
  const [peopleRes, relsRes] = await Promise.all([
    fetch(`${SUPABASE_URL}/rest/v1/people?select=*&order=created_at.asc`, { headers }),
    fetch(`${SUPABASE_URL}/rest/v1/relationships?select=*&order=created_at.asc`, { headers })
  ]);
  return { people: await peopleRes.json(), relationships: await relsRes.json() };
}

let cyInstance = null;
let personMapGlobal = {};
let childToParentsGlobal = {};
let parentToChildrenGlobal = {};
let partnersGlobal = {};

function openPanel(member) {
  document.getElementById('panel-name').textContent = member.name;
  document.getElementById('panel-relation').textContent = member.relation;
  const discordEl = document.getElementById('panel-discord');
  discordEl.textContent = member.discord_username ? `Discord: @${member.discord_username}` : '';

  const body = document.getElementById('panel-body');
  body.innerHTML = '';

  // Partners / Co-Parents
  const partnerIds = partnersGlobal[member.id] || [];
  if (partnerIds.length > 0) {
    const section = document.createElement('div');
    section.className = 'panel-section';
    section.innerHTML = `<div class="panel-section-title">Partner / Co-Parent</div><ul class="relation-list"></ul>`;
    const list = section.querySelector('.relation-list');
    partnerIds.forEach(pid => {
      const p = personMapGlobal[pid];
      if (!p) return;
      const li = document.createElement('li');
      li.className = 'relation-item';
      li.innerHTML = `<div class="relation-dot"></div><div class="relation-item-content"><div class="relation-item-name">${p.name}</div><div class="relation-item-role">${p.relation}</div></div><div class="relation-arrow">›</div>`;
      li.onclick = () => { cyInstance.$(`node[id="${pid}"]`).select(); openPanel(p); };
      list.appendChild(li);
    });
    body.appendChild(section);
  }

  // Parents
  const parentIds = childToParentsGlobal[member.id] || [];
  if (parentIds.length > 0) {
    const section = document.createElement('div');
    section.className = 'panel-section';
    section.innerHTML = `<div class="panel-section-title">Parents</div><ul class="relation-list"></ul>`;
    const list = section.querySelector('.relation-list');
    parentIds.forEach(pid => {
      const p = personMapGlobal[pid];
      if (!p) return;
      const li = document.createElement('li');
      li.className = 'relation-item';
      li.innerHTML = `<div class="relation-dot"></div><div class="relation-item-content"><div class="relation-item-name">${p.name}</div><div class="relation-item-role">${p.relation}</div></div><div class="relation-arrow">›</div>`;
      li.onclick = () => { cyInstance.$(`node[id="${pid}"]`).select(); openPanel(p); };
      list.appendChild(li);
    });
    body.appendChild(section);
  }

  // Children
  const childIds = parentToChildrenGlobal[member.id] || [];
  if (childIds.length > 0) {
    const section = document.createElement('div');
    section.className = 'panel-section';
    section.innerHTML = `<div class="panel-section-title">Children</div><ul class="relation-list"></ul>`;
    const list = section.querySelector('.relation-list');
    childIds.forEach(cid => {
      const c = personMapGlobal[cid];
      if (!c) return;
      const li = document.createElement('li');
      li.className = 'relation-item';
      li.innerHTML = `<div class="relation-dot"></div><div class="relation-item-content"><div class="relation-item-name">${c.name}</div><div class="relation-item-role">${c.relation}</div></div><div class="relation-arrow">›</div>`;
      li.onclick = () => { cyInstance.$(`node[id="${cid}"]`).select(); openPanel(c); };
      list.appendChild(li);
    });
    body.appendChild(section);
  }

  // Siblings
  const siblings = [];
  parentIds.forEach(pid => {
    (parentToChildrenGlobal[pid] || []).forEach(sid => {
      if (sid !== member.id && !siblings.find(s => s.id === sid)) {
        const sib = personMapGlobal[sid];
        if (sib) siblings.push(sib);
      }
    });
  });
  if (siblings.length > 0) {
    const section = document.createElement('div');
    section.className = 'panel-section';
    section.innerHTML = `<div class="panel-section-title">Siblings</div><ul class="relation-list"></ul>`;
    const list = section.querySelector('.relation-list');
    siblings.forEach(sib => {
      const li = document.createElement('li');
      li.className = 'relation-item';
      li.innerHTML = `<div class="relation-dot"></div><div class="relation-item-content"><div class="relation-item-name">${sib.name}</div><div class="relation-item-role">${sib.relation}</div></div><div class="relation-arrow">›</div>`;
      li.onclick = () => { cyInstance.$(`node[id="${sib.id}"]`).select(); openPanel(sib); };
      list.appendChild(li);
    });
    body.appendChild(section);
  }

  // Birthday
  const bday = formatBirthday(member.birthday);
  if (bday) {
    const section = document.createElement('div');
    section.className = 'panel-section';
    section.innerHTML = `<div class="panel-section-title">Birthday</div><div class="birthday-badge">🎂 ${bday}</div>`;
    body.appendChild(section);
  }

  // Added by
  if (member.added_by) {
    const section = document.createElement('div');
    section.className = 'panel-section';
    section.innerHTML = `<div class="panel-section-title">Added By</div><div class="added-by-text">Added to the tree by ${member.added_by}</div>`;
    body.appendChild(section);
  }

  document.getElementById('side-panel').classList.add('open');
  document.getElementById('overlay').classList.add('visible');
}

function closePanel() {
  document.getElementById('side-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
  if (cyInstance) cyInstance.$(':selected').unselect();
}

async function init() {
  try {
    const { people, relationships } = await fetchData();
    people.forEach(p => personMapGlobal[p.id] = p);

    const seenEdges = new Set();
    const edges = [];

    relationships.forEach(r => {
      const key = `${r.person_a}-${r.person_b}`;
      if (seenEdges.has(key)) return;
      seenEdges.add(key);

      if (r.relationship_type === 'parent_of') {
        if (!childToParentsGlobal[r.person_b]) childToParentsGlobal[r.person_b] = [];
        if (!childToParentsGlobal[r.person_b].includes(r.person_a)) childToParentsGlobal[r.person_b].push(r.person_a);
        if (!parentToChildrenGlobal[r.person_a]) parentToChildrenGlobal[r.person_a] = [];
        if (!parentToChildrenGlobal[r.person_a].includes(r.person_b)) parentToChildrenGlobal[r.person_a].push(r.person_b);
        edges.push({ data: { id: key, source: r.person_a, target: r.person_b, relType: 'parent_of' } });
      } else {
        // spouse, co_parent, partner
        if (!partnersGlobal[r.person_a]) partnersGlobal[r.person_a] = [];
        if (!partnersGlobal[r.person_a].includes(r.person_b)) partnersGlobal[r.person_a].push(r.person_b);
        if (!partnersGlobal[r.person_b]) partnersGlobal[r.person_b] = [];
        if (!partnersGlobal[r.person_b].includes(r.person_a)) partnersGlobal[r.person_b].push(r.person_a);
        edges.push({ data: { id: key, source: r.person_a, target: r.person_b, relType: r.relationship_type } });
      }
    });

    const connectedIds = new Set();
    relationships.forEach(r => { connectedIds.add(r.person_a); connectedIds.add(r.person_b); });

    const nodes = people
      .filter(p => connectedIds.has(p.id))
      .map(p => ({
        data: {
          id: p.id,
          label: p.name.length > 16 ? p.name.slice(0, 14) + '…' : p.name,
          fullData: p,
          isYou: p.relation === 'You' ? true : undefined
        }
      }));

    cytoscapeDagre(cytoscape);

    cyInstance = cytoscape({
      container: document.getElementById('cy'),
      elements: { nodes, edges },
      style: [
        {
          selector: 'node',
          style: {
            'background-color': '#111111',
            'border-color': '#C9A84C',
            'border-width': 1.5,
            'width': 180,
            'height': 72,
            'shape': 'roundrectangle',
            'label': 'data(label)',
            'text-valign': 'center',
            'text-halign': 'center',
            'color': '#F0EDE8',
            'font-family': 'Cormorant Garamond, serif',
            'font-size': 15,
            'font-weight': 600,
            'text-wrap': 'wrap',
            'text-max-width': 160,
            'transition-property': 'border-color, border-width, background-color, shadow-blur',
            'transition-duration': '0.2s',
          }
        },
        {
          selector: 'node[isYou]',
          style: {
            'border-width': 2.5,
            'border-color': '#E8C96A',
            'background-color': '#0D0A00',
            'shadow-blur': 24,
            'shadow-color': '#C9A84C',
            'shadow-opacity': 0.6,
            'shadow-offset-x': 0,
            'shadow-offset-y': 0,
          }
        },
        {
          selector: 'node:hover',
          style: {
            'border-color': '#E8C96A',
            'border-width': 2,
            'background-color': '#1A1400',
            'shadow-blur': 16,
            'shadow-color': '#C9A84C',
            'shadow-opacity': 0.4,
            'shadow-offset-x': 0,
            'shadow-offset-y': 0,
            'cursor': 'pointer',
          }
        },
        {
          selector: 'node:selected',
          style: {
            'border-color': '#E8C96A',
            'border-width': 3,
            'background-color': '#1A1400',
            'shadow-blur': 30,
            'shadow-color': '#C9A84C',
            'shadow-opacity': 0.8,
            'shadow-offset-x': 0,
            'shadow-offset-y': 0,
          }
        },
        {
          selector: 'edge[relType = "parent_of"]',
          style: {
            'width': 1.5,
            'line-color': 'rgba(201,168,76,0.4)',
            'target-arrow-shape': 'none',
            'curve-style': 'taxi',
            'taxi-direction': 'downward',
            'taxi-turn': 50,
          }
        },
        {
          selector: 'edge[relType != "parent_of"]',
          style: {
            'width': 1.5,
            'line-color': 'rgba(201,168,76,0.6)',
            'line-style': 'dashed',
            'line-dash-pattern': [6, 4],
            'target-arrow-shape': 'none',
            'curve-style': 'bezier',
          }
        },
        {
          selector: 'edge:selected',
          style: {
            'line-color': 'rgba(201,168,76,0.9)',
            'width': 2,
          }
        }
      ],
      layout: {
        name: 'dagre',
        rankDir: 'TB',
        nodeSep: 40,
        rankSep: 120,
        ranker: 'tight-tree',
        padding: 100,
        animate: true,
        animationDuration: 800,
        animationEasing: 'ease-out-cubic',
      },
      userZoomingEnabled: true,
      userPanningEnabled: true,
      boxSelectionEnabled: false,
      autoungrabify: false,
    });

    cyInstance.on('tap', 'node', function(evt) {
      openPanel(evt.target.data('fullData'));
    });

    document.getElementById('panel-close').onclick = closePanel;
    document.getElementById('overlay').onclick = closePanel;
    document.getElementById('zoom-in').onclick = () => cyInstance.zoom({ level: cyInstance.zoom() * 1.3, renderedPosition: { x: window.innerWidth/2, y: window.innerHeight/2 } });
    document.getElementById('zoom-out').onclick = () => cyInstance.zoom({ level: cyInstance.zoom() * 0.77, renderedPosition: { x: window.innerWidth/2, y: window.innerHeight/2 } });
    document.getElementById('reset-view').onclick = () => cyInstance.fit(undefined, 80);

    document.getElementById('member-count').textContent = `${nodes.length} Members`;
    setTimeout(() => document.getElementById('loading').classList.add('hidden'), 800);

  } catch(err) {
    console.error(err);
    document.querySelector('.loading p').textContent = 'Failed to load. Check your connection.';
  }
}

init();
</script>
</body>
</html>
