<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Family Tree</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
<style>
  :root {
    --gold: #C9A84C;
    --gold-dim: rgba(201,168,76,0.15);
    --gold-glow: rgba(201,168,76,0.35);
    --black: #000000;
    --card: #111111;
    --text: #F0EDE8;
    --text-dim: rgba(240,237,232,0.5);
    --border: rgba(201,168,76,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--black); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow: hidden; }

  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events: none; z-index: 100; opacity: 0.4; }

  header { position: fixed; top: 0; left: 0; right: 0; z-index: 50; padding: 24px 40px 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, transparent 100%); display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 20px; }
  .ornament { display: flex; align-items: center; gap: 10px; }
  .orn-line { width: 40px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold)); }
  .orn-line.r { background: linear-gradient(90deg, var(--gold), transparent); }
  .orn-diamond { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); }
  h1 { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; color: var(--text); letter-spacing: 1px; }
  h1 em { color: var(--gold); font-style: italic; }
  .member-count { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); border: 1px solid var(--border); padding: 4px 12px; border-radius: 2px; }
  .controls { display: flex; gap: 8px; }
  .ctrl-btn { background: rgba(201,168,76,0.08); border: 1px solid var(--border); color: var(--gold); width: 36px; height: 36px; border-radius: 4px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .ctrl-btn:hover { background: var(--gold-dim); box-shadow: 0 0 12px var(--gold-glow); }

  #cy { width: 100vw; height: 100vh; }

  .tooltip { position: fixed; background: #141414; border: 1px solid rgba(201,168,76,0.3); border-radius: 10px; padding: 16px 20px; pointer-events: none; opacity: 0; transition: opacity 0.2s; z-index: 200; max-width: 260px; box-shadow: 0 8px 32px rgba(0,0,0,0.6); }
  .tooltip.visible { opacity: 1; }
  .tooltip-name { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .tooltip-relation { font-size: 11px; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
  .tooltip-detail { font-size: 12px; color: var(--text-dim); line-height: 1.8; }
  .tooltip-detail span { color: var(--text); }

  .loading { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--black); z-index: 300; transition: opacity 0.5s; }
  .loading.hidden { opacity: 0; pointer-events: none; }
  .loading-ornament { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .loading-line { width: 80px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold)); animation: loadLine 1.5s ease-in-out infinite; }
  .loading-line.r { background: linear-gradient(90deg, var(--gold), transparent); animation-delay: 0.75s; }
  @keyframes loadLine { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
  .loading h2 { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; color: var(--text); letter-spacing: 3px; margin-bottom: 8px; }
  .loading h2 em { color: var(--gold); font-style: italic; }
  .loading p { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

  footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 16px 40px; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%); display: flex; align-items: center; justify-content: space-between; z-index: 50; }
  .legend { display: flex; align-items: center; gap: 20px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-dim); }
  .legend-box { width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid var(--gold); background: #111111; }
  .legend-box.you { border-width: 2.5px; box-shadow: 0 0 8px rgba(201,168,76,0.35); }
  .hint { font-size: 11px; color: var(--text-dim); }
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="loading-ornament">
    <div class="loading-line"></div>
    <div class="orn-diamond"></div>
    <div class="loading-line r"></div>
  </div>
  <h2>The <em>Family</em> Tree</h2>
  <p>Gathering the roots...</p>
</div>

<header>
  <div class="header-left">
    <div class="ornament">
      <div class="orn-line"></div>
      <div class="orn-diamond"></div>
      <div class="orn-line r"></div>
    </div>
    <h1>The <em>Family</em> Tree</h1>
    <div class="member-count" id="member-count">Loading...</div>
  </div>
  <div class="controls">
    <button class="ctrl-btn" id="zoom-in">+</button>
    <button class="ctrl-btn" id="zoom-out">−</button>
    <button class="ctrl-btn" id="reset-view">⌂</button>
  </div>
</header>

<div id="cy"></div>

<div class="tooltip" id="tooltip">
  <div class="tooltip-name" id="tt-name"></div>
  <div class="tooltip-relation" id="tt-relation"></div>
  <div class="tooltip-detail" id="tt-detail"></div>
</div>

<footer>
  <div class="legend">
    <div class="legend-item"><div class="legend-box you"></div><span>Root (Jamisha)</span></div>
    <div class="legend-item"><div class="legend-box"></div><span>Family Member</span></div>
  </div>
  <div class="hint">Pinch to zoom · Drag to pan · Tap for details</div>
</footer>

<script>
const SUPABASE_URL = 'https://wlifcojugqocdxfkwoae.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndsaWZjb2p1Z3FvY2R4Zmt3b2FlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MDU4NTYsImV4cCI6MjA5MTA4MTg1Nn0.TKcJPTEFFcBM4lZgKMd8H4Ejy9F7wTmPdYMkYofMMCQ';

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function formatBirthday(dateStr) {
  if (!dateStr || dateStr.startsWith('1900')) return null;
  const parts = dateStr.split('-');
  return `${MONTHS[parseInt(parts[1],10)-1]} ${parseInt(parts[2],10)}`;
}

async function fetchData() {
  const headers = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` };
  const [peopleRes, relsRes] = await Promise.all([
    fetch(`${SUPABASE_URL}/rest/v1/people?select=*`, { headers }),
    fetch(`${SUPABASE_URL}/rest/v1/relationships?select=*`, { headers })
  ]);
  return { people: await peopleRes.json(), relationships: await relsRes.json() };
}

async function init() {
  const { people, relationships } = await fetchData();

  const personMap = {};
  people.forEach(p => personMap[p.id] = p);

  const childToParents = {};
  const parentToChildren = {};
  relationships.forEach(r => {
    if (!childToParents[r.person_b]) childToParents[r.person_b] = [];
    childToParents[r.person_b].push(r.person_a);
    if (!parentToChildren[r.person_a]) parentToChildren[r.person_a] = [];
    parentToChildren[r.person_a].push(r.person_b);
  });

  const connectedIds = new Set();
  relationships.forEach(r => { connectedIds.add(r.person_a); connectedIds.add(r.person_b); });

  // Build Cytoscape nodes and edges
  const nodes = people
    .filter(p => connectedIds.has(p.id))
    .map(p => ({
      data: {
        id: p.id,
        label: p.name.length > 16 ? p.name.slice(0, 14) + '…' : p.name,
        relation: p.relation,
        fullData: p,
        isYou: p.relation === 'You'
      }
    }));

  const edges = relationships.map(r => ({
    data: {
      id: `${r.person_a}-${r.person_b}`,
      source: r.person_a,
      target: r.person_b
    }
  }));

  const cy = cytoscape({
    container: document.getElementById('cy'),
    elements: { nodes, edges },
    style: [
      {
        selector: 'node',
        style: {
          'background-color': '#111111',
          'border-color': '#C9A84C',
          'border-width': 1.5,
          'width': 170,
          'height': 80,
          'shape': 'roundrectangle',
          'label': 'data(label)',
          'text-valign': 'center',
          'text-halign': 'center',
          'color': '#F0EDE8',
          'font-family': 'Cormorant Garamond, serif',
          'font-size': 14,
          'font-weight': 600,
          'text-wrap': 'wrap',
          'text-max-width': 150,
        }
      },
      {
        selector: 'node[isYou]',
        style: {
          'border-width': 2.5,
          'border-color': '#C9A84C',
          'background-color': '#1a1400',
          'overlay-color': '#C9A84C',
          'shadow-blur': 20,
          'shadow-color': '#C9A84C',
          'shadow-opacity': 0.5,
          'shadow-offset-x': 0,
          'shadow-offset-y': 0,
        }
      },
      {
        selector: 'edge',
        style: {
          'width': 1.5,
          'line-color': 'rgba(201,168,76,0.5)',
          'target-arrow-shape': 'none',
          'curve-style': 'taxi',
          'taxi-direction': 'downward',
          'taxi-turn': 50,
        }
      },
      {
        selector: 'node:selected',
        style: {
          'border-color': '#FFD700',
          'border-width': 3,
        }
      }
    ],
    layout: {
      name: 'dagre',
      rankDir: 'TB',
      nodeSep: 30,
      rankSep: 140,
      padding: 80,
      animate: true,
      animationDuration: 500,
    },
    userZoomingEnabled: true,
    userPanningEnabled: true,
    boxSelectionEnabled: false,
  });

  // Tooltip
  const tooltip = document.getElementById('tooltip');

  cy.on('mouseover tap', 'node', function(evt) {
    const member = evt.target.data('fullData');
    const parents = (childToParents[member.id] || []).map(pid => personMap[pid]?.name).filter(Boolean);
    const children = (parentToChildren[member.id] || []).map(cid => personMap[cid]?.name).filter(Boolean);

    document.getElementById('tt-name').textContent = member.name;
    document.getElementById('tt-relation').textContent = member.relation;

    let detail = '';
    if (parents.length) detail += `<span>Child of:</span> ${parents.join(', ')}<br>`;
    if (children.length) detail += `<span>Parent of:</span> ${children.join(', ')}<br>`;
    const bday = formatBirthday(member.birthday);
    if (bday) detail += `<span>Birthday:</span> ${bday}<br>`;
    if (member.added_by) detail += `<span>Added by:</span> ${member.added_by}<br>`;
    if (member.discord_username) detail += `<span>Discord:</span> @${member.discord_username}`;

    document.getElementById('tt-detail').innerHTML = detail || 'No additional info';
    tooltip.classList.add('visible');

    const pos = evt.target.renderedPosition();
    tooltip.style.left = (pos.x + 100) + 'px';
    tooltip.style.top = (pos.y - 40) + 'px';
  });

  cy.on('mouseout', 'node', function() {
    tooltip.classList.remove('visible');
  });

  // Controls
  document.getElementById('zoom-in').onclick = () => cy.zoom({ level: cy.zoom() * 1.3, renderedPosition: { x: window.innerWidth/2, y: window.innerHeight/2 } });
  document.getElementById('zoom-out').onclick = () => cy.zoom({ level: cy.zoom() * 0.77, renderedPosition: { x: window.innerWidth/2, y: window.innerHeight/2 } });
  document.getElementById('reset-view').onclick = () => cy.fit(undefined, 80);

  document.getElementById('member-count').textContent = `${nodes.length} Members`;
  setTimeout(() => document.getElementById('loading').classList.add('hidden'), 800);
}

init().catch(err => {
  console.error(err);
  document.querySelector('.loading p').textContent = 'Failed to load. Check your connection.';
});
</script>
</body>
</html>
